<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Тараклия-Кишинев</title>
    <!-- Подключаем официальный скрипт Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --block-bg: #ffffff;
            --text-color: #000000;
            --hint-color: #8e8e93;
            --button-bg: #007aff;
            --button-text: #ffffff;
            --input-border: #e5e5ea;
        }

        /* Автоматическая адаптация под темную/светлую тему Telegram */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --block-bg: #1c1c1e;
                --text-color: #ffffff;
                --hint-color: #8e8e93;
                --input-border: #3a3a3c;
            }
        }

        /* Если Telegram передает свои переменные, приоритет им */
        body.tg-theme {
            --bg-color: var(--tg-theme-bg-color, #f2f2f7);
            --block-bg: var(--tg-theme-secondary-bg-color, #1c1c1e);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #8e8e93);
            --button-bg: var(--tg-theme-button-color, #007aff);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* Стильные iOS блоки-карточки */
        .ios-group {
            background-color: var(--block-bg);
            border-radius: 12px;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
        }

        .ios-row {
            display: flex;
            flex-direction: column;
            padding: 12px 0;
            border-bottom: 1px solid var(--input-border);
        }

        .ios-row:last-child {
            border-bottom: none;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--hint-color);
            margin-bottom: 6px;
            font-weight: 500;
        }

        /* Выравнивание для всех инпутов строго ПО ЛЕВОМУ КРАЮ */
        select, input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 17px;
            padding: 4px 0;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
            text-align: left !important; /* Жесткое выравнивание влево */
            -webkit-appearance: none; /* Убираем нативные стрелочки Safari */
        }

        /* Специфичный фикс для Айфонов, чтобы время не прыгало в центр */
        input[type="time"] {
            text-align: left;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .hint-text {
            font-size: 13px;
            color: var(--hint-color);
            text-align: center;
            margin-top: 10px;
            padding: 0 20px;
            line-height: 1.4;
        }

        /* Контейнер для кнопок внизу */
        .action-buttons {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 20px;
        }

        .btn {
            width: 100%;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            padding: 14px;
            text-align: center;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .btn:active {
            opacity: 0.7;
        }

        .btn-main {
            background-color: var(--button-bg);
            color: var(--button-text);
        }

        .btn-cancel {
            background-color: transparent;
            color: #ff3b30; /* Нативный красный цвет Apple для отмены */
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Единый блочный контейнер в стиле Настроек iOS -->
    <div class="ios-group">
        <div class="ios-row">
            <label>Направление</label>
            <select id="direction">
                <option value="Кишинев ➔ Тараклия">Кишинев ➔ Тараклия</option>
                <option value="Тараклия ➔ Кишинев">Тараклия ➔ Кишинев</option>
            </select>
        </div>

        <div class="ios-row">
            <label>День выезда</label>
            <select id="date"></select>
        </div>

        <div class="ios-row">
            <label>Время выезда</label>
            <!-- Фикс левого края работает тут -->
            <input type="time" id="time" value="18:00">
        </div>

        <div class="ios-row">
            <label>Свободных мест</label>
            <select id="seats">
                <option value="1">1 место</option>
                <option value="2">2 места</option>
                <option value="3">3 места</option>
                <option value="4" selected>4 места</option>
                <option value="5">5 мест</option>
                <option value="6">6 мест</option>
            </select>
        </div>
    </div>

    <div class="hint-text">Заполни данные и нажми на кнопку внизу экрана</div>

    <!-- Блок кнопок -->
    <div class="action-buttons">
        <button class="btn btn-main" id="submitBtn">Создать поездку 🚗</button>
        <button class="btn btn-cancel" id="cancelBtn">Отмена</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран
        document.body.classList.add('tg-theme');

        // Автоматическая генерация дат (Сегодня, Завтра и т.д.)
        const dateSelect = document.getElementById('date');
        const days = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
        const months = ['01', '02', '03', '04', '05', '06', '07', '08', '09', '10', '11', '12'];

        for (let i = 0; i < 7; i++) {
            const current = new Date();
            current.setDate(current.getDate() + i);
            
            let dayName = days[current.getDay()];
            if (i === 0) dayName = "Сегодня";
            if (i === 1) dayName = "Завтра";

            const dateStr = `${current.getDate()}.${months[current.getMonth()]}`;
            const optionText = `${dayName} (${dateStr})`;
            
            const option = document.createElement('option');
            option.value = optionText;
            option.textContent = optionText;
            dateSelect.appendChild(option);
        }

        // Отправка данных при клике "Создать поездку"
        document.getElementById('submitBtn').addEventListener('click', () => {
            const data = {
                direction: document.getElementById('direction').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                seats: document.getElementById('seats').value
            };
            tg.sendData(json.stringify(data));
            tg.close();
        });

        // Кнопка Отмена — просто закрывает мини-приложение
        document.getElementById('cancelBtn').addEventListener('click', () => {
            tg.close();
        });
    </script>
</body>
</html>
