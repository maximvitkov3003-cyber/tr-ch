<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тараклия-Кишинев</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --block-bg: #ffffff;
            --text-color: #000000;
            --hint-color: #8e8e93;
        }

        /* Настройки для ТЕМНОЙ темы */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;      
                --block-bg: #1c1c1e;     
                --text-color: #ffffff;
                --hint-color: #8e8e93;
            }
        }

        /* Коррекция под темы самого Telegram */
        body.tg-theme {
            --bg-color: var(--tg-theme-bg-color, #000000);
            --block-bg: var(--tg-theme-secondary-bg-color, #1c1c1e);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #8e8e93);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* Блоки в стиле Apple */
        .ios-block {
            background-color: var(--block-bg);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--hint-color);
            margin-bottom: 4px;
            font-weight: 600;
            display: block;
            text-align: left;
        }

        select {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 17px;
            padding: 4px 0;
            outline: none;
            font-family: inherit;
            text-align: left;
            -webkit-appearance: none; 
        }

        .time-container {
            display: flex;
            justify-content: flex-start;
            width: 100%;
        }

        input[type="time"] {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 17px;
            padding: 4px 0;
            outline: none;
            font-family: inherit;
            text-align: left !important;
            -webkit-appearance: none;
            display: inline-block;
            width: auto; 
        }

        .hint-text {
            font-size: 13px;
            color: var(--hint-color);
            text-align: center;
            margin: 8px 0;
        }

        /* Кнопки управления в одном стиле */
        .action-buttons {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn {
            width: 100%;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            padding: 14px;
            text-align: center;
            border: none;
            cursor: pointer;
            box-sizing: border-box;
        }

        .btn:active {
            opacity: 0.5;
        }

        /* Зеленая прозрачная кнопка */
        .btn-main {
            background-color: transparent;
            color: #34c759;
        }

        /* Красная прозрачная кнопка */
        .btn-cancel {
            background-color: transparent;
            color: #ff3b30;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="ios-block">
        <label>Направление</label>
        <select id="direction">
            <option value="Кишинев ➔ Тараклия">Кишинев ➔ Тараклия</option>
            <option value="Тараклия ➔ Кишинев">Тараклия ➔ Кишинев</option>
        </select>
    </div>

    <div class="ios-block">
        <label>День выезда</label>
        <select id="date"></select>
    </div>

    <div class="ios-block">
        <label>Время выезда</label>
        <div class="time-container">
            <input type="time" id="time" value="18:00">
        </div>
    </div>

    <div class="ios-block">
        <label>Свободных мест</label>
        <select id="seats">
            <option value="1">1 место</option>
            <option value="2">2 места</option>
            <option value="3">3 места</option>
            <option value="4" selected>4 места</option>
            <option value="5">5 мест</option>
            <option value="6">6 мест</option>
        </select>
    </div>

    <div class="hint-text">Заполни данные и нажми на кнопку внизу экрана</div>

    <div class="action-buttons">
        <button class="btn btn-main" id="submitBtn">Создать поездку 🚗</button>
        <button class="btn btn-cancel" id="cancelBtn">Отмена</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        document.body.classList.add('tg-theme');

        const dateSelect = document.getElementById('date');
        const days = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
        const months = ['01', '02', '03', '04', '05', '06', '07', '08', '09', '10', '11', '12'];

        for (let i = 0; i < 7; i++) {
            const current = new Date();
            current.setDate(current.getDate() + i);
            
            let dayName = days[current.getDay()];
            if (i === 0) dayName = "Сегодня";
            if (i === 1) dayName = "Завтра";

            const dateStr = `${current.getDate()}.${months[current.getMonth()]}`;
            const optionText = `${dayName} (${dateStr})`;
            
            const option = document.createElement('option');
            option.value = optionText;
            option.textContent = optionText;
            dateSelect.appendChild(option);
        }

        document.getElementById('submitBtn').addEventListener('click', () => {
            const data = {
                direction: document.getElementById('direction').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                seats: document.getElementById('seats').value
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            tg.close();
        });
    </script>
</body>
</html>
