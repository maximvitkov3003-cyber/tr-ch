<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступные рейсы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #fff;
            --tg-theme-text-color: #000;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #fff;
            --tg-theme-secondary-bg-color: #efeff4;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f7);
            color: var(--tg-theme-text-color, #000);
            margin: 0;
            padding: 15px;
            padding-bottom: 80px;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
            font-size: 22px;
        }

        /* Стиль для контейнера вкладок (Табов) */
        .tabs-container {
            display: flex;
            background: #e2e2e6;
            padding: 3px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .tab-button {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            color: #555;
            transition: all 0.2s ease;
        }

        /* Активная вкладка */
        .tab-button.active {
            background: #fff;
            color: #000;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        /* Стили карточек рейсов */
        .ride-card {
            background-color: var(--tg-theme-bg-color, #fff);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .direction-badge {
            display: inline-block;
            background: #333;
            color: #fff;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .driver-info {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .ride-details {
            font-size: 14px;
            color: #666;
            margin: 4px 0;
        }

        .book-btn {
            width: 100%;
            background-color: #2ec761;
            color: #fff;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            margin-top: 12px;
            cursor: pointer;
        }

        .book-btn:active {
            filter: brightness(0.9);
        }

        .no-rides {
            text-align: center;
            color: #8e8e93;
            margin-top: 40px;
            font-size: 16px;
        }

        /* Фиксированная кнопка Закрыть в самом низу */
        .close-btn-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            background: linear-gradient(to top, var(--tg-theme-secondary-bg-color) 80%, transparent);
        }

        .close-btn {
            width: 100%;
            background-color: #ff3b30;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Доступные рейсы 🚗</h2>

    <div class="tabs-container">
        <button class="tab-button active" onclick="switchTab('all')">Все</button>
        <button class="tab-button" onclick="switchTab('to_chisinau')">В Кишинёв</button>
        <button class="tab-button" onclick="switchTab('to_taraclia')">В Тараклию</button>
    </div>

    <div id="rides-list"></div>

    <div class="close-btn-container">
        <button class="close-btn" onclick="closeApp()">Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        let allRides = [];
        let currentTab = 'all'; // Может быть: all, to_chisinau, to_taraclia

        // Чтение данных из URL-параметра ?data=...
        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('data');

        if (rawData) {
            try {
                allRides = JSON.parse(decodeURIComponent(rawData));
            } catch (e) {
                console.error("Ошибка парсинга данных:", e);
            }
        }

        // Функция переключения вкладок
        function switchTab(tabName) {
            currentTab = tabName;
            
            // Меняем визуально активную кнопку в дизайне
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            if (tabName === 'all') document.querySelectorAll('.tab-button')[0].classList.add('active');
            if (tabName === 'to_chisinau') document.querySelectorAll('.tab-button')[1].classList.add('active');
            if (tabName === 'to_taraclia') document.querySelectorAll('.tab-button')[2].classList.add('active');

            // Перерисовываем список с учетом выбранного фильтра
            renderRides();
        }

        // Функция рендеринга (вывода) поездок на экран
        function renderRides() {
            const container = document.getElementById('rides-list');
            container.innerHTML = '';

            // Фильтруем массив в зависимости от выбранной вкладки
            const filteredRides = allRides.filter(ride => {
                const direction = ride[6]; // Направление лежит в 6-м элементе массива рейса
                
                if (currentTab === 'to_chisinau') {
                    // Проверяем, что пункт назначения — Кишинёв
                    return direction.includes('Кишинев') || direction.includes('Кишинёв');
                }
                if (currentTab === 'to_taraclia') {
                    // Проверяем, что пункт назначения — Тараклия
                    return direction.includes('Тараклия');
                }
                return true; // Если вкладка 'all', показываем всё
            });

            if (filteredRides.length === 0) {
                container.innerHTML = '<div class="no-rides">Пока нет активных поездок в этом направлении 🤷‍♂️</div>';
                return;
            }

            // Создаем карточки для отфильтрованных рейсов
            filteredRides.forEach(ride => {
                const [rideId, driverName, driverUser, dateText, timeText, freeSeats, direction] = ride;

                const card = document.createElement('div');
                card.className = 'ride-card';
                card.innerHTML = `
                    <div class="direction-badge">📍 ${direction}</div>
                    <div class="driver-info">🚗 Водитель: ${driverName} (${driverUser})</div>
                    <div class="ride-details">📅 Дата выезда: ${dateText}</div>
                    <div class="ride-details">🕒 Время выезда: ${timeText}</div>
                    <div class="ride-details">💺 Свободно мест: <b>${freeSeats}</b></div>
                    <button class="book-btn" onclick="bookRide(${rideId})">Забронировать место</button>
                `;
                container.appendChild(card);
            });
        }

        // Функция отправки данных о бронировании в бот
        function bookRide(rideId) {
            const dataToSend = {
                action: "book",
                ride_id: rideId
            };
            tg.sendData(JSON.stringify(dataToSend));
        }

        function closeApp() {
            tg.close();
        }

        // Первый запуск вывода при открытии страницы
        renderRides();
    </script>
</body>
</html>
