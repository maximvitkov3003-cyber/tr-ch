<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступные рейсы</title>
    <!-- Подключаем стили Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f7);
            color: var(--tg-theme-text-color, #000);
            margin: 0;
            padding: 15px;
            padding-bottom: 80px;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
            font-size: 22px;
            color: var(--tg-theme-text-color, #000);
        }

        /* Адаптивный контейнер вкладок под темную/светлую тему */
        .tabs-container {
            display: flex;
            background-color: var(--tg-theme-bg-color, #fff);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        /* В темной теме делаем границы контейнера мягче */
        @media (prefers-color-scheme: dark) {
            .tabs-container {
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
        }

        .tab-button {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 9px;
            cursor: pointer;
            color: var(--tg-theme-hint-color, #8e8e93);
            transition: all 0.2s ease;
        }

        /* Активная вкладка подстраивается под тему Telegram (становится синей/акцентной) */
        .tab-button.active {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            box-shadow: 0px 2px 6px rgba(0, 0, 0, 0.1);
        }

        /* Карточки рейсов */
        .ride-card {
            background-color: var(--tg-theme-bg-color, #fff);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .direction-badge {
            display: inline-block;
            background-color: var(--tg-theme-secondary-bg-color, #efeff4);
            color: var(--tg-theme-text-color, #000);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .driver-info {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .ride-details {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #8e8e93);
            margin: 5px 0;
        }

        .book-btn {
            width: 100%;
            background-color: #2ec761;
            color: #fff;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            margin-top: 12px;
            cursor: pointer;
        }

        .book-btn:active {
            filter: brightness(0.9);
        }

        .no-rides {
            text-align: center;
            color: var(--tg-theme-hint-color, #8e8e93);
            margin-top: 40px;
            font-size: 16px;
        }

        .close-btn-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            background: linear-gradient(to top, var(--tg-theme-secondary-bg-color) 70%, transparent);
        }

        .close-btn {
            width: 100%;
            background-color: var(--tg-theme-destructive-text-color, #ff3b30);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Доступные рейсы 🚗</h2>

    <!-- БЛОК ВКЛАДОК -->
    <div class="tabs-container">
        <button class="tab-button active" onclick="switchTab('all')">Все</button>
        <button class="tab-button" onclick="switchTab('to_chisinau')">В Кишинёв</button>
        <button class="tab-button" onclick="switchTab('to_taraclia')">В Тараклию</button>
    </div>

    <!-- Контейнер для карточек -->
    <div id="rides-list"></div>

    <div class="close-btn-container">
        <button class="close-btn" onclick="closeApp()">Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        let allRides = [];
        let currentTab = 'all'; 

        // Чтение переданных данных из URL
        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('data');

        if (rawData) {
            try {
                allRides = JSON.parse(decodeURIComponent(rawData));
            } catch (e) {
                console.error("Ошибка парсинга:", e);
            }
        }

        // Переключение визуального стиля вкладок
        function switchTab(tabName) {
            currentTab = tabName;
            
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            if (tabName === 'all') buttons[0].classList.add('active');
            if (tabName === 'to_chisinau') buttons[1].classList.add('active');
            if (tabName === 'to_taraclia') buttons[2].classList.add('active');

            renderRides();
        }

        // Фильтрация и вывод карточек на экран
        function renderRides() {
            const container = document.getElementById('rides-list');
            container.innerHTML = '';

            const filteredRides = allRides.filter(ride => {
                // Извлекаем строку направления, убираем пробелы по краям и переводим в нижний регистр
                const direction = String(ride[6] || "").toLowerCase().trim();
                
                if (currentTab === 'to_chisinau') {
                    // Строка должна строго заканчиваться на пункт назначения ("кишинев" или "кишинёв")
                    return direction.endsWith('кишинев') || direction.endsWith('кишинёв');
                }
                if (currentTab === 'to_taraclia') {
                    // Строка должна строго заканчиваться на пункт назначения "тараклия"
                    return direction.endsWith('тараклия');
                }
                return true; // Вкладка 'all' — возвращаем все элементы
            });

            if (filteredRides.length === 0) {
                container.innerHTML = '<div class="no-rides">Пока нет активных поездок в этом направлении 🤷‍♂️</div>';
                return;
            }

            // Отрисовка карточек
            filteredRides.forEach(ride => {
                const [rideId, driverName, driverUser, dateText, timeText, freeSeats, direction] = ride;

                const card = document.createElement('div');
                card.className = 'ride-card';
                card.innerHTML = `
                    <div class="direction-badge">📍 ${direction}</div>
                    <div class="driver-info">🚗 Водитель: ${driverName} (${driverUser})</div>
                    <div class="ride-details">📅 Дата выезда: ${dateText}</div>
                    <div class="ride-details">🕒 Время выезда: ${timeText}</div>
                    <div class="ride-details">💺 Свободно мест: <b>${freeSeats}</b></div>
                    <button class="book-btn" onclick="bookRide(${rideId})">Забронировать место</button>
                `;
                container.appendChild(card);
            });
        }

        // Бронирование поездки
        function bookRide(rideId) {
            const dataToSend = {
                action: "book",
                ride_id: rideId
            };
            tg.sendData(JSON.stringify(dataToSend));
        }

        function closeApp() {
            tg.close();
        }

        // Первичный рендеринг при загрузке страницы
        renderRides();
    </script>
</body>
</html>
